<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watermelon Viewer</title>
  <link rel="stylesheet" href="styles/side_panel_style.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 90vh; background: #111; overflow: hidden; }
    #canvas-container { width: 100%; height: 100%; }

    #drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,255,100,0.08);
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-family: sans-serif;
      display: flex;
      z-index: 10;
      color: #00ff88;
      opacity: 50%;
    }

    #drop-overlay.active {
      opacity: 100%;
      border: 3px dashed #00ff88;
      transition: 0.5s;


    }
  </style>
</head>
<body>
<div id="drop-overlay">Drop 3D model here</div>
<div id="canvas-container">


</div>
<div style="position: absolute; bottom: 2%; width: 100%; display: flex; align-items: center; justify-content: space-evenly">
  <button id="openViewer">Viewer</button>
  <button id="configureViewer">Settings</button>
  <button id="contactButton">Contact</button>
  <button id="donate">Donation</button>
</div>



<script src="src/chrome-plugin/sidepanel.js"></script>
</body>
</html>
