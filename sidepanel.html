<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watermelon Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100vh; background: #111; overflow: hidden; }
    #canvas-container { width: 100%; height: 100%; }

    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,255,100,0.08);
      border: 3px dashed #00ff88;
      z-index: 10;
      align-items: center;
      justify-content: center;
      color: #00ff88;
      font-size: 1.2rem;
      font-family: sans-serif;
    }
    #drop-overlay.active { display: flex; }
  </style>
</head>
<body>
<div id="drop-overlay">Drop 3D model here</div>
<div id="canvas-container"></div>
<script src="src/chrome-plugin/sidepanel.js"></script>
</body>
</html>
