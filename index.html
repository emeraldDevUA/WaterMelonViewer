<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>

    <link rel="stylesheet" href="styles/style.css"/>
    <link rel="icon"  href="public/logo_no_background.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>water_melon_viewer</title>

  </head>
  <body>
    <div id = "app">

      <div id="ui">
        <button id="main_menu">
          <svg width="20" height="20" viewBox="0 0 20 20" stroke="currentColor">
            <path d="M3 6.5a1 1 0 100-2 1 1 0 000 2z"></path>
            <path d="M6 5.5c0-.28.22-.5.5-.5h11a.5.5 0 010 1h-11a.5.5 0 01-.5-.5z"></path>
            <path d="M6 9.5c0-.28.22-.5.5-.5h11a.5.5 0 010 1h-11a.5.5 0 01-.5-.5z"></path>
            <path d="M10.5 13a.5.5 0 000 1h7a.5.5 0 000-1h-7z"></path>
            <path d="M8 13.5a1 1 0 11-2 0 1 1 0 012 0z"></path>
            <path d="M3 10.5a1 1 0 100-2 1 1 0 000 2z"></path>
          </svg>
        </button>

        <button id="light_menu">
          <svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" width="20" height="20" viewBox="0 0 22 32"  xml:space="preserve" stroke="currentColor">

          <path d="M7.609,29.554c-0.271-0.06-0.536,0.109-0.598,0.378c-0.06,0.27,0.109,0.537,0.379,0.597l6.5,1.458   C13.928,31.996,13.964,32,14,32c0.229,0,0.436-0.158,0.488-0.391c0.06-0.27-0.109-0.537-0.379-0.597L7.609,29.554z"/>

        </svg>
        </button>

        <div id="btn_container">
          <button style="margin-left: 10%" id="vertices">
            <svg width="20" height="20" viewBox="0 0 20 20" stroke="currentColor">
              <circle cx="5" cy="5" r="1.5"></circle>
              <circle cx="15" cy="5" r="1.5"></circle>
              <circle cx="5" cy="15" r="1.5"></circle>
              <circle cx="15" cy="15" r="1.5"></circle>
              <circle cx="10" cy="10" r="1.5"></circle>
            </svg>
          </button>
          <button style="margin-left: 10%" id="edges">
            <svg width="20" height="20" viewBox="0 0 20 20" stroke="currentColor">

              <polygon points="4,15 10,4 16,15"/>
              <line x1="4" y1="15" x2="16" y2="15"/>
              <line x1="10" y1="4" x2="10" y2="15"/>

            </svg>
          </button>
          <button style="margin-left: 10%" id="normals">
            <svg width="20" height="20" viewBox="0 0 20 20" >

              <!-- surface -->
              <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1"></line>

              <!-- normal vectors -->
              <line x1="6" y1="15" x2="6" y2="8" stroke="currentColor" stroke-width="1"></line>
              <polygon points="6,6 4.5,8 7.5,8"></polygon>

              <line x1="10" y1="15" x2="10" y2="8" stroke="currentColor" stroke-width="1"></line>
              <polygon points="10,6 8.5,8 11.5,8"></polygon>

              <line x1="14" y1="15" x2="14" y2="8" stroke="currentColor" stroke-width="1"></line>
              <polygon points="14,6 12.5,8 15.5,8"></polygon>

            </svg>
          </button>

        </div>
        <div class="settings-panel" id="panel-vertices">
          <div class="panel-inner">
            <div class="panel-title">Vertex settings</div>
            <div class="row">
              <label>Size</label>
              <label><input type="range" min="1" max="20" value="5" oninput="this.nextElementSibling.textContent=this.value"></label>
              <span class="val">5</span></div>
            <div class="row"><label>Color</label>
              <label><input type="color" value="#4a90e2"></label>
            </div>
            <div class="row"><label>Shape</label>
              <label>
              <select><option>Circle</option>
                <option>Square</option>
                <option>Diamond</option>
              </select>
            </label>
            </div>
          </div>
        </div>

        <div class="settings-panel" id="panel-edges">
          <div class="panel-inner">
            <div class="panel-title">Edge settings</div>
            <div class="row"><label>Width</label><label>
              <input type="range" min="1" max="10" value="2" oninput="this.nextElementSibling.textContent=this.value">
            </label><span class="val">2</span></div>
            <div class="row"><label>Style</label>
              <label>
                <select><option>Solid</option><option>Dashed</option><option>Dotted</option></select>
              </label>
            </div>

            <div class="row">
              <label>Color</label>
              <label><input type="color" value="#333333"></label>
            </div>

          </div>
        </div>

        <div class="settings-panel" id="panel-normals">
          <div class="panel-inner">
            <div class="panel-title">Normal settings</div>
            <div class="row">
              <label>Length</label>
              <label><input type="range" min="5" max="50" value="20" oninput="this.nextElementSibling.textContent=this.value"></label>
              <span class="val">20</span>
            </div>
            <div class="row">
              <label>Color</label>
              <label><input type="color" value="#e24b4a"></label>
            </div>
            <div class="row">
              <label>Arrow</label>
              <label><select><option>Arrow</option><option>Line</option><option>Dot</option></select></label>
            </div>
          </div>
        </div>
      </div>

        <div id="settings_container" class = "hidden">

          <h3>Camera</h3>
          <div class="subblock grid-block">
          <div class="setting">
            <label for="autoRotate">Auto Rotate</label>
            <input type="checkbox" id="autoRotate">
          </div>

          <div class="setting">
            <label for="autoRotateSpeed">Auto Rotate Speed</label>
            <input type="number" id="autoRotateSpeed" step="0.1" min="0" max="10" value="0.1">
          </div>
        </div>

            <h3>Debug</h3>

          <div class="subblock grid-block">
            <span class="subblock-label">Grid</span>
            <div class="setting">
              <label for="showGrid">Show</label>
              <input type="checkbox" id="showGrid">
            </div>
            <div class="setting">
              <label for="grid_size">Size</label>
              <input type="number" id="grid_size" step="5" min="1" max="500" value="5">
            </div>
          </div>

          <div class="subblock axes-block">
            <span class="subblock-label">Axes</span>
            <div class="setting">
              <label for="showAxes">Show</label>
              <input type="checkbox" id="showAxes">
            </div>
            <div class="setting">
              <label for="axes_size">Size</label>
              <input type="number" id="axes_size" step="5" min="1" max="500" value="5">
            </div>
          </div>

          <h3>Scene</h3>
          <div class="subblock axes-block" id="scene_elements">
          </div>
          <button id="recenter-btn">Recenter Mesh</button>
          <button id="clear-btn">Clear Scene</button>
        </div>

        <div id="lighting_container" class = "hidden">

          <h3>Renderer</h3>
          <div class="subblock grid-block">
          <div class="setting">
            <label for="enableSkyBox">Skybox</label>
            <input type="checkbox" id="enableSkyBox">
          </div>

          <div class="setting">
            <label for="backgroundColor">Background Color</label>
            <input type="color" id="backgroundColor">
          </div>

          <div class="setting">
            <label for="exposure">Exposure</label>
            <input type="number" id="exposure" step="0.1" min="0" max="5" value="1.2">
          </div>
        </div>

          <div class="subblock grid-block">
          <div class="setting">
            <label for="shadowsEnabled">Enable Shadows</label>
            <input type="checkbox" id="shadowsEnabled">
            <label for="showLightGizmo">Gizmos</label>
            <input type="checkbox" id="showLightGizmo">
          </div>
          </div>

          <h3>Lighting</h3>
          <div class="subblock grid-block">
          <button id="lighting_config1">Lighting Configuration 1</button>
          <button id="lighting_config2">Lighting Configuration 2</button>
          <button id="lighting_config3">Lighting Configuration 3</button>
          <button id="lighting_config4">Lighting Configuration 4</button>
          <button id="lighting_config5">Lighting Configuration 5</button>
          </div>
        </div>

        <button id = "model_properties">
          <svg xmlns="http://www.w3.org/2000/svg" id="Capa_1" width="15px" height="15px"
               viewBox="0 0 27.774 27.774" xml:space="preserve" stroke="currentColor" fill="currentColor">
              <path d="M10.398,22.811h4.618v4.964h-4.618V22.811z M21.058,1.594C19.854,0.532,17.612,0,14.33,0c-3.711,0-6.205,0.514-7.482,1.543   c-1.277,1.027-1.916,3.027-1.916,6L4.911,8.551h4.577l-0.02-1.049c0-1.424,0.303-2.377,0.907-2.854   c0.604-0.477,1.814-0.717,3.632-0.717c1.936,0,3.184,0.228,3.74,0.676c0.559,0.451,0.837,1.457,0.837,3.017   c0,1.883-0.745,3.133-2.237,3.752l-1.797,0.766c-1.882,0.781-3.044,1.538-3.489,2.27c-0.442,0.732-0.665,2.242-0.665,4.529h4.68   v-0.646c0-1.41,0.987-2.533,2.965-3.365c2.03-0.861,3.343-1.746,3.935-2.651c0.592-0.908,0.888-2.498,0.888-4.771   C22.863,4.625,22.261,2.655,21.058,1.594z"/>
        </svg>
        </button>

        <div id="model_properties_container" class = "hidden">
          <h3>Model Info</h3>
          <div>Vertices: <span id="vert_count">0</span></div>
          <div>Faces: <span id="face_count">0</span></div>
          <div>Has Normals: <span id="has_normals">true</span></div>
        </div>

    </div>

    <script type="module" src="src/main.ts"></script>

  </body>
</html>
